name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 需要写 GitHub Release

jobs:
  build-windows:
    name: Build Windows (.msi + .exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build & upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hindsight ${{ github.ref_name }}"
          releaseBody: |
            从下方资源中下载安装包：
            - `hindsight_x.y.z_x64.msi` — Windows 安装版（推荐）
            - `hindsight_x.y.z_x64-setup.exe` — Windows NSIS 安装器
          releaseDraft: true
          prerelease: false
