name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # 需要写 GitHub Release

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build & upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri Updater：tauri-action 检测到下面两个变量后会自动签名 NSIS .exe
          # 并生成 latest.json 一起上传到 Release，App 内 check() 即可拉到。
          # 私钥本地生成（npx @tauri-apps/cli signer generate），保存到 GitHub
          # Repository Secrets，密码为空就只填 KEY 不填 PASSWORD。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Hindsight ${{ github.ref_name }}"
          releaseBody: |
            从下方资源中下载安装包：
            - `hindsight_x.y.z_x64-setup.exe` — Windows 安装器
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
