<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hindsight Demo</title>
    <link rel="icon" type="image/png" href="/demo/favicon.png" />
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC",
          "Microsoft YaHei", system-ui, sans-serif;
      }
      /* 屏蔽 iframe 内的滚动条阴影 */
      body {
        overflow: hidden;
      }
    </style>
    <script type="module" crossorigin src="/demo/assets/index-Bczilt86.js"></script>
    <link rel="stylesheet" crossorigin href="/demo/assets/index-DvOAhQuO.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 在主 bundle 加载前根据 ?lang= 设置 demo UI 语言（i18n 启动时从 localStorage 读）
      (function () {
        try {
          var lng = new URLSearchParams(location.search).get("lang");
          if (lng === "en" || lng === "ja" || lng === "zh-CN") {
            localStorage.setItem("hindsight.locale", lng);
          }
        } catch (e) {}
      })();
    </script>
  </body>
</html>
